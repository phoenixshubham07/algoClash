<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="crimson-glow" x="-30%" y="-30%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(1, 2)">
    <!-- Cyan Cursor (Left) pointing to center -->
    <path 
      d="M7 6 L17 9 L13.5 10.5 L16.5 15 L14.5 16 L11.5 11.5 L9.5 14 Z" 
      fill="#00F2FE" 
      stroke="#005A60"
      stroke-width="0.5"
      filter="url(#cyan-glow)" 
      transform="rotate(12, 12, 10)" 
    />

    <!-- Crimson Cursor (Right) pointing to center -->
    <path 
      d="M23 6 L13 9 L16.5 10.5 L13.5 15 L15.5 16 L18.5 11.5 L20.5 14 Z" 
      fill="#FF2E93" 
      stroke="#600A30"
      stroke-width="0.5"
      filter="url(#crimson-glow)" 
      transform="rotate(-12, 18, 10)" 
    />
  </g>
</svg>